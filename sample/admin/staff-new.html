<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubNext Admin — 직원 등록</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .toast {
      position: fixed;
      top: var(--sp-6);
      right: var(--sp-6);
      background: var(--navy-900);
      color: var(--white);
      padding: var(--sp-3) var(--sp-5);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      box-shadow: var(--shadow-lg);
      transform: translateY(-20px);
      opacity: 0;
      transition: all var(--duration-normal) var(--ease-out);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast .toast-icon {
      width: 20px;
      height: 20px;
      background: var(--green-500);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- Navbar -->
    <nav class="navbar">
      <a class="navbar-brand" href="#">Hub<span>Next</span></a>
      <div class="navbar-menu">
        <div class="nav-dropdown" id="userMgmt">
          <button class="nav-dropdown-toggle active" onclick="toggleDropdown('userMgmt')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            사용자관리
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="nav-dropdown-panel">
            <div class="nav-dropdown-group">
              <div class="nav-dropdown-label">고객관리</div>
              <a class="nav-dropdown-item" href="members.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                고객 목록
              </a>
            </div>
            <div class="nav-dropdown-group">
              <div class="nav-dropdown-label">직원관리</div>
              <a class="nav-dropdown-item" href="staff.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                직원 목록
              </a>
              <a class="nav-dropdown-item active" href="staff-new.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                직원 등록
              </a>
            </div>
          </div>
        </div>
        <div class="nav-dropdown" id="opsMgmt">
          <button class="nav-dropdown-toggle" onclick="toggleDropdown('opsMgmt')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            운영
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="nav-dropdown-panel">
            <div class="nav-dropdown-group">
              <a class="nav-dropdown-item" href="#">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                대시보드
              </a>
              <a class="nav-dropdown-item" href="#">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                권한 관리
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="navbar-end">
        <span class="user-name">김관리</span>
        <div class="navbar-avatar">김</div>
        <button class="navbar-logout" onclick="location.href='login.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          로그아웃
        </button>
      </div>
    </nav>
    <div class="sub-header">
      <nav class="breadcrumb">
        <a href="#">관리자</a>
        <span class="separator">/</span>
        <a href="staff.html">직원 목록</a>
        <span class="separator">/</span>
        <span class="current">새 직원 등록</span>
      </nav>
    </div>

    <!-- Main -->
    <main class="main">
      <div class="page-header animate-in">
        <div>
          <h1 class="page-title">새 직원 등록</h1>
          <p class="page-subtitle">새로운 직원의 정보를 입력하세요</p>
        </div>
      </div>

      <form onsubmit="handleSubmit(event)">
        <!-- 직원 정보 -->
        <div class="card mb-6 animate-in delay-1">
          <div class="card-header">
            <span class="card-title">직원 정보</span>
          </div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="name">이름 <span class="required">*</span></label>
                <input class="form-input" type="text" id="name" placeholder="이름 입력" required minlength="2" maxlength="50">
              </div>
              <div class="form-group">
                <label class="form-label" for="email">이메일 <span class="required">*</span></label>
                <input class="form-input" type="email" id="email" placeholder="email@hubnext.com" required>
                <div class="form-error" id="emailError" style="display: none;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                  이미 사용 중인 이메일입니다
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="hireDate">입사일</label>
                <input class="form-input" type="date" id="hireDate" max="2026-04-12">
              </div>
            </div>
          </div>
        </div>

        <!-- 조직 정보 -->
        <div class="card mb-6 animate-in delay-2">
          <div class="card-header">
            <span class="card-title">조직 정보</span>
          </div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="department">부서 <span class="required">*</span></label>
                <select class="form-input" id="department" required onchange="handleDeptChange(this.value)">
                  <option value="">부서 선택</option>
                  <option value="admin">관리팀</option>
                  <option value="logistics">물류팀</option>
                  <option value="cs">고객지원팀</option>
                  <option value="qa">QA팀</option>
                  <option value="finance">재무팀</option>
                  <option value="operations">운영팀</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="position">직급 <span class="required">*</span></label>
                <select class="form-input" id="position" required>
                  <option value="">직급 선택</option>
                  <option value="intern">인턴</option>
                  <option value="staff">사원</option>
                  <option value="senior">대리</option>
                  <option value="manager">과장</option>
                  <option value="teamlead">팀장</option>
                  <option value="director">이사</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="responsibilities">담당 업무</label>
              <textarea class="form-input" id="responsibilities" placeholder="담당 업무 입력" maxlength="200" rows="3"></textarea>
              <div class="form-hint">최대 200자</div>
            </div>
          </div>
        </div>

        <!-- 초기 권한 -->
        <div class="card mb-6 animate-in delay-3">
          <div class="card-header">
            <span class="card-title">초기 권한</span>
            <span style="font-size: var(--text-xs); color: var(--gray-400);">부서 선택 시 기본 권한이 자동 설정됩니다</span>
          </div>
          <div class="card-body">
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" id="perm-admin" name="permissions">
                <div>
                  <div class="checkbox-label">관리자</div>
                  <div class="checkbox-desc">전체 권한 (시스템 설정, 직원 관리 포함)</div>
                </div>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="perm-logistics" name="permissions">
                <div>
                  <div class="checkbox-label">물류관리</div>
                  <div class="checkbox-desc">보관/배송/랙관리</div>
                </div>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="perm-customer" name="permissions">
                <div>
                  <div class="checkbox-label">고객관리</div>
                  <div class="checkbox-desc">고객/결제/문의</div>
                </div>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="perm-operations" name="permissions">
                <div>
                  <div class="checkbox-label">운영관리</div>
                  <div class="checkbox-desc">게시판/통계/로그</div>
                </div>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="perm-report" name="permissions">
                <div>
                  <div class="checkbox-label">리포트</div>
                  <div class="checkbox-desc">조회/다운로드</div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="animate-in delay-4" style="display: flex; justify-content: flex-end; gap: var(--sp-3);">
          <a class="btn btn-secondary btn-lg" href="staff.html">취소</a>
          <button type="submit" class="btn btn-accent btn-lg" id="submitBtn">
            <span class="btn-text">등록하기</span>
          </button>
        </div>
      </form>

      <!-- Toast -->
      <div class="toast" id="toast">
        <div class="toast-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span id="toastText">직원 등록 완료. 사번: HN20260042</span>
      </div>
    </main>
  </div>

  <script>
    function toggleDropdown(id) {
      document.querySelectorAll('.nav-dropdown').forEach(d => {
        if (d.id !== id) d.classList.remove('open');
      });
      document.getElementById(id).classList.toggle('open');
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('.nav-dropdown')) {
        document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    // Department → default permission mapping
    const deptPermMap = {
      admin: ['perm-admin'],
      logistics: ['perm-logistics'],
      cs: ['perm-customer'],
      qa: ['perm-logistics'],
      finance: ['perm-report'],
      operations: ['perm-operations'],
    };

    function handleDeptChange(dept) {
      // Clear all permission checkboxes
      document.querySelectorAll('[name="permissions"]').forEach(cb => cb.checked = false);

      // Auto-check based on department
      if (deptPermMap[dept]) {
        deptPermMap[dept].forEach(id => {
          const cb = document.getElementById(id);
          if (cb) cb.checked = true;
        });
      }
    }

    // Email duplicate check demo
    const emailInput = document.getElementById('email');
    let emailTimeout;
    emailInput.addEventListener('input', function() {
      clearTimeout(emailTimeout);
      const err = document.getElementById('emailError');
      err.style.display = 'none';
      this.classList.remove('error');

      emailTimeout = setTimeout(() => {
        // Demo: flag specific email as duplicate
        if (this.value === 'cs.kim@hubnext.com') {
          err.style.display = 'flex';
          this.classList.add('error');
        }
      }, 500);
    });

    function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:var(--navy-900);border-radius:50%;animation:spin 0.6s linear infinite;"></span>';

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-text">등록하기</span>';

        // Show toast
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          // Redirect after toast
          setTimeout(() => {
            window.location.href = 'staff-detail.html';
          }, 300);
        }, 2500);
      }, 1500);
    }
  </script>
</body>
</html>
